<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#E0E7FF"/>
  
  <!-- Technology/Innovation Theme -->
  <!-- Monitor/Screen -->
  <rect x="120" y="80" width="160" height="110" rx="8" fill="#6366F1"/>
  <rect x="130" y="90" width="140" height="80" fill="#4F46E5"/>
  <rect x="185" y="190" width="30" height="30" fill="#6366F1"/>
  <rect x="170" y="220" width="60" height="4" rx="2" fill="#6366F1"/>
  
  <!-- Circuit board elements -->
  <circle cx="80" cy="100" r="6" fill="#818CF8"/>
  <circle cx="320" cy="120" r="6" fill="#818CF8"/>
  <circle cx="90" cy="180" r="4" fill="#A5B4FC"/>
  <circle cx="310" cy="200" r="4" fill="#A5B4FC"/>
  
  <!-- Connection lines -->
  <line x1="80" y1="100" x2="120" y2="110" stroke="#818CF8" stroke-width="2"/>
  <line x1="280" y1="110" x2="320" y2="120" stroke="#818CF8" stroke-width="2"/>
  <line x1="90" y1="180" x2="120" y2="160" stroke="#A5B4FC" stroke-width="2"/>
  <line x1="280" y1="160" x2="310" y2="200" stroke="#A5B4FC" stroke-width="2"/>
  
  <!-- Data visualization elements on screen -->
  <rect x="145" y="105" width="30" height="50" rx="2" fill="#818CF8" opacity="0.6"/>
  <rect x="185" y="125" width="30" height="30" rx="2" fill="#818CF8" opacity="0.6"/>
  <rect x="225" y="115" width="30" height="40" rx="2" fill="#818CF8" opacity="0.6"/>
</svg>
